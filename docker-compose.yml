version: '3.8'

services:
  file-transformer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: file-transformer-for-ai
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
