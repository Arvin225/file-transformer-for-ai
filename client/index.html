<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文件转换器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>文件转换器</h1>
    <p class="subtitle">将不同格式的文件转换为 AI 友好的 Markdown/HTML 格式</p>
    
    <div class="format-selector">
      <label class="format-option">
        <input type="radio" name="format" value="word-md" checked>
        <span>Word → Markdown</span>
      </label>
      <label class="format-option">
        <input type="radio" name="format" value="word-html">
        <span>Word → HTML</span>
      </label>
      <label class="format-option">
        <input type="radio" name="format" value="excel-md">
        <span>Excel → Markdown</span>
      </label>
      <label class="format-option">
        <input type="radio" name="format" value="csv-md">
        <span>CSV → Markdown</span>
      </label>
    </div>
    
    <div class="upload-area" id="dropZone">
      <input type="file" id="fileInput" accept=".docx,.doc" hidden>
      <div class="upload-content">
        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>拖拽文件到此处，或 <span class="highlight">点击上传</span></p>
        <p class="file-types" id="fileTypeHint">支持 .docx, .doc 格式</p>
      </div>
    </div>

    <div id="progressArea" class="hidden">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p id="statusText">正在转换...</p>
    </div>

    <div id="resultArea" class="hidden">
      <div class="success-message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <span>转换成功!</span>
      </div>
      <p class="download-info">文件将自动下载</p>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
